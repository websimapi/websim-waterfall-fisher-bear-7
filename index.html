<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Waterfall Fisher Bear</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-container">
        <div id="score-container" class="hidden">
            <div class="score-label">SCORE</div>
            <div id="score">0</div>
        </div>
        <div id="streak-container" class="hidden">
            <div class="streak-label">STREAK</div>
            <div id="streak">x1</div>
        </div>
        <div id="game-over-screen" class="hidden">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-button">RESTART</button>
        </div>
        <div id="start-screen">
            <h1>Waterfall Fisher Bear</h1>
            <p>Catch the fish swimming down the waterfall!</p>
            <div class="controls">
                <p><strong>Desktop:</strong> Click the fish</p>
                <p><strong>Mobile:</strong> Tap the fish</p>
            </div>
            <button id="start-button">START</button>
        </div>
    </div>
    <script type="module" src="main.js"></script>
